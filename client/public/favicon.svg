<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Fenrir</title>
  <!-- Tile oscuro con esquinas redondeadas, igual al logo mark -->
  <rect width="32" height="32" rx="7" fill="#14152B"/>
  <!-- Cabeza del lobo: orejas puntiagudas que confluyen con la cara -->
  <path fill="white" d="
    M16 27
    C21.5 27 26 23.5 26 19
    C26 16 25 13.5 23.5 12.5
    L22 4
    L19 12
    C17.5 11.5 14.5 11.5 13 12
    L10 4
    L8.5 12.5
    C7 13.5 6 16 6 19
    C6 23.5 10.5 27 16 27Z
  "/>
  <!-- Orejas internas: triángulo oscuro para dar forma dentro de cada oreja -->
  <path fill="#14152B" d="M10 4 L12.5 11.5 L8.5 12.5Z" opacity="0.45"/>
  <path fill="#14152B" d="M22 4 L23.5 12.5 L19.5 11.5Z" opacity="0.45"/>
  <!-- Ojos -->
  <circle cx="12" cy="18" r="2" fill="#14152B"/>
  <circle cx="20" cy="18" r="2" fill="#14152B"/>
  <!-- Nariz -->
  <ellipse cx="16" cy="22.5" rx="2.2" ry="1.4" fill="#14152B"/>
</svg>
